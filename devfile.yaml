schemaVersion: 2.1.0
metadata:
  name: che-code
components:
  - name: che-code-runtime-description
    container:
      image: quay.io/rnikitenko/ubi8test:latest
      command:
        - /checode/entrypoint-volume.sh
      volumeMounts:
        - name: checode
          path: /checode
      memoryLimit: 8Gi
      memoryRequest: 256Mi
      cpuLimit: 3500m
      cpuRequest: 30m
    attributes:
      app.kubernetes.io/component: che-code-runtime
      app.kubernetes.io/part-of: che-code.eclipse.org
commands:
  - id: build
    exec:
      component: dev
      workingDir: ${PROJECTS_ROOT}/che-code
      commandLine: |
        yarn watch
      group:
        kind: build
        isDefault: true
  - id: run
    exec:
      component: dev
      workingDir: ${PROJECTS_ROOT}/che-code
      commandLine: |
        yarn server
      group:
        kind: run
        isDefault: true
